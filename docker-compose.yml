services:
  api:
    build: .
    container_name: ai-agent-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./memory:/app/memory
      - ./logs:/app/logs

  dashboard:
    build: .
    container_name: ai-agent-dashboard
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./memory:/app/memory
      - ./logs:/app/logs
    depends_on:
      - api